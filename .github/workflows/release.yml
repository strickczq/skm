name: Release

# Publish binaries when a version tag is pushed (e.g. `v0.1.0`).
on:
  push:
    tags:
      - 'v[0-9]+.*'

# The jobs create a GitHub Release and upload assets to it.
permissions:
  contents: write

jobs:
  # Create the GitHub Release once, so the matrix upload jobs don't race to
  # create it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/create-gh-release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      # Builds `--release`, packages `skm-<target>.tar.gz` with a sha256
      # checksum, and uploads it to the release for this tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: skm
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
