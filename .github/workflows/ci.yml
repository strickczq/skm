name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only reads the checked-out code.
permissions:
  contents: read

# Cancel superseded runs on a PR branch; never cancel pushes to main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Rust-aware caching (registry, git deps, and target/) with automatic
      # keying on Cargo.lock + rustc version and stale-entry pruning.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Configure git identity (needed by integration tests)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
